name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Permissões necessárias para o GitHub Actions criar a branch gh-pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Rodamos o install dentro da pasta client onde está o seu package.json
        run: npm install
        working-directory: ./client

      - name: Build
        # O build é disparado dentro de client, mas o Vite joga o resultado em /dist (raiz)
        run: npm run build
        working-directory: ./client

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # IMPORTANTE: Como seu vite.config define o outDir na raiz, 
          # o publish_dir deve ser ./dist (relativo à raiz do repositório)
          publish_dir: ./dist
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'